name: Publish Python distribution

on:
  push:
    tags:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install pypa/build
      run: |
        python3 -m pip install build --user
        python3 -m pip install twine --user
        python3 -m pip install wheel --user

    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Python distribution to PyPI
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/PQEnalyzer
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true

  github-release:
    name: >-
      Create or update GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: build git-changelog
      run: |
        python3 -m pip install git-changelog

    - name: Get previous tag
      id: previous_tag
      run: |
        previous_tag="$(git --no-pager tag --sort=creatordate --merged "$GITHUB_REF_NAME" | grep -Fxv "$GITHUB_REF_NAME" | tail -1 || true)"
        echo "previous tag: $previous_tag"
        echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

    - name: Generate release notes
      id: changelog
      run: |
        {
          echo "notes<<EOF"
          if [ -n "${{ steps.previous_tag.outputs.previous_tag }}" ]; then
            git-changelog --sections ci,doc,feat,fix,perf,test -F "${{ steps.previous_tag.outputs.previous_tag }}.." -c angular
          else
            git-changelog --sections ci,doc,feat,fix,perf,test -c angular
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
      run: |
        if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes "$RELEASE_NOTES"
        else
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes "$RELEASE_NOTES"
        fi

    - name: Build CHANGELOG.md
      run: |
        if [ ! -s CHANGELOG.md ]; then
          printf '# Changelog\n\n<!-- insertion marker -->\n' > CHANGELOG.md
        fi
        git-changelog --sections ci,doc,feat,fix,perf,test -o CHANGELOG.md -c angular --in-place

    - name: Add CHANGELOG.md to commit
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

        git add CHANGELOG.md
        if git diff --cached --quiet; then
          echo "No changelog changes to commit."
          exit 0
        fi

        git commit -m "doc: update changelog"

    - name: Push changes
      if: github.event_name == 'push'
      run: git push origin HEAD:main

  pypi-release-update:
    name: >-
      Sign the Python distribution with Sigstore
      and upload them to GitHub Release
    needs:
    - publish-to-pypi
    - github-release
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.4.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl

    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        '${{ github.ref_name }}' dist/**
        --repo '${{ github.repository }}'
